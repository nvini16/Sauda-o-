<!doctype html>
<html lang="pt-BR">
 <head>
   <meta name="viewport" content="width=device-width, width-initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
    <title>Personalizar saudação</title>
 </head>
 <body>
   <div class="center">
     <h1>Seja bem vindo!</h1>
     <p>Personalizar saudação usando JS</p>
     <div id="saudacao" class="p-style">Olá, visitante!</div>

     <button onclick="mudarNome()">Personalizar saudação</button>
   </div>

   
  

   <script>
     
     function mudarNome() {
       let nome = "Nathanael"
       let mensagem = "É muito bom ter você devolta!"
     document.getElementById("saudacao").textContent = "Olá, " + nome + ". " + mensagem 
       }
     
   </script>
 </body>
</html>
